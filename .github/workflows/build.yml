name: build

on:
  push:
  pull_request:
  workflow_dispatch:

# Needed so the job can push the regenerated demo.pdf back to the repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile demo.tex (pdflatex via latexmk)
        uses: xu-cheng/latex-action@v3
        env:
          # Reproducible build: pin the PDF's embedded timestamp so identical
          # source always yields byte-identical output. Without this, pdflatex
          # stamps the current time into /CreationDate, so every build would
          # differ and the auto-commit step below would churn on every push.
          SOURCE_DATE_EPOCH: "1735689600"   # 2025-01-01T00:00:00Z, fixed
          FORCE_SOURCE_DATE: "1"
        with:
          root_file: demo.tex
          # Engine: pdflatex is the default. To switch to LuaLaTeX (needed for
          # fontspec + true Fira Code), set the next line to true instead.
          latexmk_use_lualatex: false

      - name: Upload PDF artifact
        if: always()              # keep the log/PDF even when the build is red
        uses: actions/upload-artifact@v4
        with:
          name: demo-pdf
          path: demo.pdf
          if-no-files-found: ignore

      # Commit the freshly built demo.pdf back to the repo so the checked-in
      # preview never goes stale. Guards:
      #   - success()                  only on a green build (not a partial PDF)
      #   - push to main only          never on PRs (forks can't push) or branches
      #   - skip if unchanged          no empty commits
      #   - "[skip ci]" in the message stops the bot's own commit from looping
      - name: Commit demo.pdf back to the repo
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -f demo.pdf ]; then
            echo "demo.pdf not found — skipping."
            exit 0
          fi
          # latex-action runs in a container as root, so the PDF may be
          # root-owned; mark the workspace safe before git touches it.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo.pdf
          if git diff --cached --quiet; then
            echo "demo.pdf unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "CI: update demo.pdf [skip ci]"
          # Be resilient if another push landed while the build ran.
          git pull --rebase --autostash origin main
          git push
