name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compile demo.tex (pdflatex via latexmk)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: demo.tex
          # Engine: pdflatex is the default. To switch to LuaLaTeX (needed for
          # fontspec + true Fira Code), set the next line to true instead.
          latexmk_use_lualatex: false

      - name: Render first-slide thumbnail (PNG)
        if: success()
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          mkdir -p assets
          pdftoppm -png -singlefile -r 150 demo.pdf assets/demo-thumb

      - name: Upload PDF artifact
        if: always()              # keep the log/PDF even when the build is red
        uses: actions/upload-artifact@v7
        with:
          name: demo-pdf
          path: |
            demo.pdf
            assets/demo-thumb.png
          if-no-files-found: ignore
